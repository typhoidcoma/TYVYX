<h3 style="margin-top:12px">Flight Controls</h3>
<div id="flight_controls">
  <button id="btn_takeoff">Takeoff</button>
  <button id="btn_land">Land</button>
  <div style="display:flex;gap:6px;margin-top:6px">
    <button id="btn_up">↑</button>
    <button id="btn_left">←</button>
    <button id="btn_right">→</button>
    <button id="btn_down">↓</button>
  </div>
  <div style="display:flex;gap:6px;margin-top:6px">
    <button id="btn_cam1">Camera 1</button>
    <button id="btn_cam2">Camera 2</button>
  </div>
  <div style="margin-top:6px">
    <button id="btn_start_video">Start Video</button>
    <button id="btn_stop_video">Stop Video</button>
  </div>
</div>
