<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>TYVYX Drone Control</title>
  <style>
    body{font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial;margin:16px}
    .panel{display:flex;gap:18px}
    .left{flex:1}
    .right{width:360px}
    img#video{max-width:100%;border:1px solid #ccc}
    select,input,button{font-size:1rem;padding:8px;margin:6px 0;width:100%}
    .log{background:#111;color:#eee;padding:8px;height:240px;overflow:auto;font-family:monospace}
  </style>
</head>
<body>
  <h1>WiFi Drone Control Web App</h1>
  <div class="panel">
    <div class="left">
      <h3>Live Video</h3>
      <div style="position:relative;display:inline-block">
        <img id="video" src="/video_feed" alt="Live video feed">
        <div id="video_overlay" style="display:none;position:absolute;left:0;top:0;right:0;bottom:0;align-items:center;justify-content:center;display:flex;background:rgba(0,0,0,0.45);color:#fff;font-weight:600;font-size:1.1rem;">Switching camera…</div>
      </div>
      <div id="video_status" style="margin-top:8px;font-weight:600">Status: unknown</div>
      <div id="video_ffmpeg" style="margin-top:6px;font-family:monospace;white-space:pre-wrap;display:none;color:#333;background:#eee;padding:6px;border-radius:4px;max-height:180px;overflow:auto"></div>
    </div>

    <div class="right">
      {% include 'controls.html' %}
    </div>
  </div>

  <script>
    const networksEl = document.getElementById('networks');
    const logEl = document.getElementById('log');
    const passwordEl = document.getElementById('password');

    function appendLog(msg){
      const now = new Date().toLocaleTimeString();
      logEl.textContent = `[${now}] ${msg}\n` + logEl.textContent;
    }

    async function refreshNetworks(){
      appendLog('Scanning for networks...');
      try{
        const resp = await fetch('/networks');
        const body = await resp.json();
        networksEl.innerHTML = '';
        if(body.error){
          appendLog('Scan error: ' + body.error);
        }
        const nets = (body.networks || []);
        if(nets.length === 0){
          const opt = document.createElement('option'); opt.textContent = 'No networks found'; networksEl.appendChild(opt);
        } else {
          nets.forEach(n => {
            const opt = document.createElement('option'); opt.value = n.ssid; opt.textContent = n.ssid; networksEl.appendChild(opt);
          });
          appendLog(`Found ${nets.length} network(s)`);
        }
      }catch(err){
        appendLog('Network scan failed: ' + err);
      }
    }

    document.getElementById('connect').addEventListener('click', async ()=>{
      const ssid = networksEl.value;
      const password = passwordEl.value || null;
      const feed_type = document.getElementById('feed_type').value;
      const probe = document.getElementById('probe') && document.getElementById('probe').checked;
      // collect selected trusted ports
      const portsSel = Array.from(document.getElementById('ports').selectedOptions).map(o=>o.value);
      if(!ssid){ appendLog('No SSID selected'); return; }
      appendLog('Connecting to ' + ssid + ' ...');
      try{
        const resp = await fetch('/connect', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ssid,password,feed_type,probe,ports:portsSel})});
        const body = await resp.json();
        appendLog('Connect result: ' + JSON.stringify(body));
        if(body.probe_results){ appendLog('Probe results: ' + JSON.stringify(body.probe_results)); }
        // Reload video feed to pick up new network/source
        const img = document.getElementById('video');
        img.src = '/video_feed?ts=' + Date.now();
      }catch(err){
        appendLog('Connect request failed: ' + err);
      }
    });

    document.getElementById('reconnect').addEventListener('click', async ()=>{
      const feed_type = document.getElementById('feed_type').value;
      appendLog('Reconnecting video feed (' + feed_type + ')...');
      const btn = document.getElementById('reconnect');
    });

  </script>
  <script src="{{ url_for('static', filename='controls.js') }}"></script>
