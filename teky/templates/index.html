<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>TEKY Drone Control</title>
  <style>
    body{font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial;margin:16px}
    .panel{display:flex;gap:18px}
    .left{flex:1}
    .right{width:360px}
    img#video{max-width:100%;border:1px solid #ccc}
    select,input,button{font-size:1rem;padding:8px;margin:6px 0;width:100%}
    .log{background:#111;color:#eee;padding:8px;height:240px;overflow:auto;font-family:monospace}
  </style>
</head>
<body>
  <h1>TEKY Drone Control</h1>
  <div class="panel">
    <div class="left">
      <h3>Live Video</h3>
      <img id="video" src="/video_feed" alt="Live video feed">
      <div id="video_status" style="margin-top:8px;font-weight:600">Status: unknown</div>
    </div>

    <div class="right">
      <h3>Connect to Drone WiFi</h3>
      <label for="networks">Available networks</label>
      <select id="networks"><option>Loading...</option></select>
      <label for="feed_type">Video feed type</label>
      <select id="feed_type">
        <option value="rtsp">RTSP (default)</option>
        <option value="http_mjpeg">HTTP MJPEG</option>
        <option value="local0">Local camera 0</option>
        <option value="auto">Auto-detect (probe after connect)</option>
      </select>
      <label for="ports" style="margin-top:6px">Trusted ports (choose one or more)</label>
      <select id="ports" multiple style="height:110px">
        <option value="7070" selected>7070 (drone RTSP default)</option>
        <option value="554">554 (RTSP)</option>
        <option value="8554">8554 (RTSP alt)</option>
        <option value="80">80 (HTTP)</option>
        <option value="8080">8080 (HTTP alt)</option>
      </select>
      <label style="display:block;margin-top:6px"><input id="probe" type="checkbox"> Auto-probe for feeds after connect</label>
      <button id="reconnect" style="margin-top:6px">Reconnect Feed</button>
      <label for="password">Password (if required)</label>
      <input id="password" type="password" placeholder="Optional WiFi password">
      <button id="connect">Connect</button>

      <h3>Diagnostics Log</h3>
      <div id="log" class="log"></div>
      <h3 style="margin-top:12px">Probe Results</h3>
      <div id="probe_area">
        <button id="run_probe">Run Probe</button>
        <div id="probe_table_wrap" style="margin-top:8px"></div>
      </div>
    </div>
  </div>

  <script>
    const networksEl = document.getElementById('networks');
    const logEl = document.getElementById('log');
    const passwordEl = document.getElementById('password');

    function appendLog(msg){
      const now = new Date().toLocaleTimeString();
      logEl.textContent = `[${now}] ${msg}\n` + logEl.textContent;
    }

    async function refreshNetworks(){
      appendLog('Scanning for networks...');
      try{
        const resp = await fetch('/networks');
        const body = await resp.json();
        networksEl.innerHTML = '';
        if(body.error){
          appendLog('Scan error: ' + body.error);
        }
        const nets = (body.networks || []);
        if(nets.length === 0){
          const opt = document.createElement('option'); opt.textContent = 'No networks found'; networksEl.appendChild(opt);
        } else {
          nets.forEach(n => {
            const opt = document.createElement('option'); opt.value = n.ssid; opt.textContent = n.ssid; networksEl.appendChild(opt);
          });
          appendLog(`Found ${nets.length} network(s)`);
        }
      }catch(err){
        appendLog('Network scan failed: ' + err);
      }
    }

    document.getElementById('connect').addEventListener('click', async ()=>{
      const ssid = networksEl.value;
      const password = passwordEl.value || null;
      const feed_type = document.getElementById('feed_type').value;
      const probe = document.getElementById('probe') && document.getElementById('probe').checked;
      // collect selected trusted ports
      const portsSel = Array.from(document.getElementById('ports').selectedOptions).map(o=>o.value);
      if(!ssid){ appendLog('No SSID selected'); return; }
      appendLog('Connecting to ' + ssid + ' ...');
      try{
        const resp = await fetch('/connect', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ssid,password,feed_type,probe,ports:portsSel})});
        const body = await resp.json();
        appendLog('Connect result: ' + JSON.stringify(body));
        if(body.probe_results){ appendLog('Probe results: ' + JSON.stringify(body.probe_results)); }
        // Reload video feed to pick up new network/source
        const img = document.getElementById('video');
        img.src = '/video_feed?ts=' + Date.now();
      }catch(err){
        appendLog('Connect request failed: ' + err);
      }
    });

    document.getElementById('reconnect').addEventListener('click', async ()=>{
      const feed_type = document.getElementById('feed_type').value;
      appendLog('Reconnecting video feed (' + feed_type + ')...');
      const btn = document.getElementById('reconnect');
      btn.disabled = true;
      try{
        const resp = await fetch('/set_feed', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({feed_type})});
        const body = await resp.json();
        appendLog('Reconnect result: ' + JSON.stringify(body));
        // force refresh of image and status
        document.getElementById('video').src = '/video_feed?ts=' + Date.now();
        setTimeout(()=>{ pollVideoStatus(); }, 500);
      }catch(err){
        appendLog('Reconnect failed: ' + err);
      } finally{
        btn.disabled = false;
      }
    });

    // initial load
    refreshNetworks();

    // load suggested ports and pre-select
    async function loadSuggestedPorts(){
      try{
        const res = await fetch('/suggested_ports');
        const js = await res.json();
        const ports = js.ports || [];
        const sel = document.getElementById('ports');
        // clear current selections
        Array.from(sel.options).forEach(o => o.selected = ports.includes(parseInt(o.value)));
        appendLog('Suggested ports loaded: ' + ports.join(','));
      }catch(err){
        appendLog('Failed to load suggested ports: ' + err);
      }
    }
    loadSuggestedPorts();

    // periodic refresh every 20 seconds
    setInterval(refreshNetworks, 20000);

    async function pollVideoStatus(){
      try{
        const res = await fetch('/video_status');
        const js = await res.json();
        const s = document.getElementById('video_status');
        if(js.running){
          s.textContent = `Status: running (source: ${js.source || 'unknown'})`;
          document.getElementById('video').style.border = '2px solid #2ecc71';
        } else {
          s.textContent = `Status: stopped (source: ${js.source || 'none'})`;
          document.getElementById('video').style.border = '2px solid #e74c3c';
        }
      }catch(err){
        // network error
        const s = document.getElementById('video_status');
        s.textContent = 'Status: error';
      }
    }

    // start polling video status
    pollVideoStatus();
    setInterval(pollVideoStatus, 3000);

    // Probe UI
    async function runProbe(){
      appendLog('Running probe for likely feeds...');
      const wrap = document.getElementById('probe_table_wrap');
      wrap.innerHTML = 'Probing...';
      try{
        // include selected ports as a comma-separated query param
        const portsSel = Array.from(document.getElementById('ports').selectedOptions).map(o=>o.value);
        const q = portsSel.length ? '?ports=' + portsSel.join(',') : '';
        const resp = await fetch('/probe' + q);
        const js = await resp.json();
        renderProbeResults(js.results || []);
        appendLog('Probe complete');
      }catch(err){
        appendLog('Probe failed: ' + err);
        document.getElementById('probe_table_wrap').innerText = 'Probe failed';
      }
    }

    function renderProbeResults(results){
      const wrap = document.getElementById('probe_table_wrap');
      if(!results || results.length === 0){ wrap.innerText = 'No candidates found'; return; }
      const table = document.createElement('table');
      table.style.width = '100%';
      table.style.borderCollapse = 'collapse';
      const header = document.createElement('tr');
      ['URL','OK','Actions'].forEach(h=>{ const th = document.createElement('th'); th.textContent = h; th.style.textAlign='left'; th.style.padding='6px'; table.appendChild(th); });
      results.forEach(r=>{
        const tr = document.createElement('tr');
        const tdUrl = document.createElement('td'); tdUrl.style.padding='6px';
        const a = document.createElement('a'); a.href = r.url; a.textContent = r.url; a.target = '_blank'; tdUrl.appendChild(a);
        tr.appendChild(tdUrl);
        const tdOk = document.createElement('td'); tdOk.style.padding='6px'; tdOk.textContent = r.ok ? 'yes' : 'no'; tr.appendChild(tdOk);
        const tdAct = document.createElement('td'); tdAct.style.padding='6px';
        const btn = document.createElement('button'); btn.textContent = 'Select';
        btn.disabled = !r.ok;
        btn.addEventListener('click', async ()=>{
          btn.disabled = true;
          appendLog('Selecting feed ' + r.url);
          try{
            const res = await fetch('/set_feed', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({feed_type: r.url})});
            const body = await res.json();
            appendLog('Select result: ' + JSON.stringify(body));
            document.getElementById('video').src = '/video_feed?ts=' + Date.now();
            setTimeout(()=>{ pollVideoStatus(); }, 500);
          }catch(err){ appendLog('Select failed: ' + err); }
          btn.disabled = false;
        });
        tdAct.appendChild(btn);
        tr.appendChild(tdAct);
        table.appendChild(tr);
      });
      wrap.innerHTML = '';
      wrap.appendChild(table);
    }

    document.getElementById('run_probe').addEventListener('click', runProbe);

    // If connect returned probe results, render them (hooked by connect handler)
    (function interceptConnectForProbeRender(){
      const old = document.getElementById('connect').onclick;
      // handled in event listeners; instead patch appendLog to check for probe JSON not feasible here
    })();
  </script>
</body>
</html>
